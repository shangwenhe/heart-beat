<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心跳检测 - 家里有没有电</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#0b0f1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

  /* 背景光晕 */
  .bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:0.15;pointer-events:none;transition:background 1.5s}
  .bg-glow.online{background:#10b981}
  .bg-glow.offline{background:#ef4444}

  .container{max-width:720px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}

  /* 顶部标题 */
  .header{text-align:center;margin-bottom:36px}
  .header h1{font-size:22px;font-weight:600;color:#f1f5f9;letter-spacing:0.5px}
  .header p{font-size:13px;color:#475569;margin-top:6px}

  /* 状态卡片 */
  .status-card{
    position:relative;overflow:hidden;border-radius:20px;padding:40px 28px;
    margin-bottom:28px;transition:all 0.8s cubic-bezier(0.4,0,0.2,1);
    border:1px solid rgba(255,255,255,0.06);
  }
  .status-card::before{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    border-radius:20px;transition:background 0.8s;z-index:0;
  }
  .status-card.online::before{background:linear-gradient(135deg,rgba(6,95,70,0.7),rgba(4,120,87,0.5))}
  .status-card.offline::before{background:linear-gradient(135deg,rgba(127,29,29,0.7),rgba(153,27,27,0.5))}
  .status-card>*{position:relative;z-index:1}

  .status-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:30px;transition:all 0.8s}
  .status-icon.online{background:rgba(52,211,153,0.15);box-shadow:0 0 30px rgba(52,211,153,0.2)}
  .status-icon.offline{background:rgba(248,113,113,0.15);box-shadow:0 0 30px rgba(248,113,113,0.2);animation:shake 0.6s ease-in-out}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

  .status-text{font-size:26px;font-weight:700;text-align:center;letter-spacing:1px}
  .status-text.online{color:#34d399}
  .status-text.offline{color:#f87171}

  .status-meta{text-align:center;margin-top:12px;font-size:13px;color:rgba(255,255,255,0.5);line-height:1.8}

  /* 心跳动画条 */
  .heartbeat-bar{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:16px;height:24px}
  .heartbeat-bar span{width:3px;border-radius:2px;background:rgba(255,255,255,0.1);transition:all 0.3s}
  .heartbeat-bar.online span{background:#34d399}
  .heartbeat-bar.offline span{background:#f87171}
  @keyframes beat{
    0%,40%,100%{height:6px;opacity:0.3}
    10%{height:22px;opacity:1}
  }
  .heartbeat-bar.active span{animation:beat 1.2s ease-in-out infinite}
  .heartbeat-bar.active span:nth-child(2){animation-delay:0.1s}
  .heartbeat-bar.active span:nth-child(3){animation-delay:0.2s}
  .heartbeat-bar.active span:nth-child(4){animation-delay:0.3s}
  .heartbeat-bar.active span:nth-child(5){animation-delay:0.4s}

  /* 统计卡片行 */
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
  .stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px 20px;transition:border-color 0.3s}
  .stat-card:hover{border-color:rgba(255,255,255,0.1)}
  .stat-label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .stat-value{font-size:20px;font-weight:600;color:#f1f5f9;font-variant-numeric:tabular-nums}
  .stat-value.online{color:#34d399}
  .stat-value.offline{color:#f87171}

  /* 日志区 */
  .log-section{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden}
  .log-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
  .log-title{font-size:14px;font-weight:600;color:#94a3b8}

  .log-list{max-height:420px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
  .log-list::-webkit-scrollbar{width:4px}
  .log-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

  .log-item{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
  .log-item:hover{background:rgba(255,255,255,0.03)}
  .log-item:last-child{border-bottom:none}

  .log-dot{width:6px;height:6px;border-radius:50%;background:#34d399;margin-right:12px;flex-shrink:0}
  .log-time{font-family:"SF Mono","Fira Code","Cascadia Code",monospace;font-size:13px;color:#94a3b8}
  .log-ip{font-size:12px;color:#475569}

  .log-empty{text-align:center;padding:40px;color:#475569;font-size:13px}

  /* 按钮 */
  .btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#94a3b8;cursor:pointer;font-size:12px;transition:all 0.2s;font-family:inherit}
  .btn:hover{background:rgba(255,255,255,0.08);color:#e2e8f0}
  .btn:active{transform:scale(0.97)}

  /* 底部信息 */
  .footer{text-align:center;margin-top:32px;font-size:11px;color:#334155}
</style>
</head>
<body>
<div class="bg-glow offline" id="bg-glow"></div>
<div class="container">
  <div class="header">
    <h1>Heartbeat Monitor</h1>
    <p>家用电力心跳检测</p>
  </div>

  <!-- 状态卡片 -->
  <div id="status-card" class="status-card offline">
    <div id="status-icon" class="status-icon offline">⚡</div>
    <div id="status-text" class="status-text offline">检测中...</div>
    <div id="status-meta" class="status-meta">正在获取心跳状态</div>
    <div id="heartbeat-bar" class="heartbeat-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">最近心跳</div>
      <div id="stat-last" class="stat-value">--:--:--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">距上次</div>
      <div id="stat-elapsed" class="stat-value">--</div>
    </div>
  </div>

  <!-- 日志区 -->
  <div class="log-section">
    <div class="log-header">
      <span class="log-title">心跳记录</span>
      <button class="btn" onclick="loadLogs()">刷新</button>
    </div>
    <div id="log-list" class="log-list">
      <div class="log-empty">加载中...</div>
    </div>
  </div>

  <div class="footer">心跳间隔 30s · 离线阈值 90s · 自动刷新</div>
</div>

<script>
const API = '';
let lastHeartbeatTime = null;

async function loadStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    const card = document.getElementById('status-card');
    const icon = document.getElementById('status-icon');
    const text = document.getElementById('status-text');
    const meta = document.getElementById('status-meta');
    const bar = document.getElementById('heartbeat-bar');
    const glow = document.getElementById('bg-glow');
    const statLast = document.getElementById('stat-last');
    const statElapsed = document.getElementById('stat-elapsed');

    const on = d.online;

    card.className = 'status-card ' + (on ? 'online' : 'offline');
    icon.className = 'status-icon ' + (on ? 'online' : 'offline');
    icon.textContent = on ? '⚡' : '🔌';
    text.className = 'status-text ' + (on ? 'online' : 'offline');
    bar.className = 'heartbeat-bar ' + (on ? 'active online' : 'offline');
    glow.className = 'bg-glow ' + (on ? 'online' : 'offline');

    if (on) {
      text.textContent = '有电';
      meta.textContent = formatTime(d.last_heartbeat.received_at);
    } else if (d.last_heartbeat) {
      text.textContent = '可能停电';
      const diff = Math.floor((Date.now() - new Date(d.last_heartbeat.received_at).getTime()) / 1000);
      meta.textContent = formatTime(d.last_heartbeat.received_at) + ' · 已断联 ' + diff + ' 秒';
    } else {
      text.textContent = '无记录';
      meta.textContent = '尚未收到心跳';
    }

    // 统计卡片
    if (d.last_heartbeat) {
      lastHeartbeatTime = new Date(d.last_heartbeat.received_at).getTime();
      statLast.textContent = formatTime(d.last_heartbeat.received_at).split(' ')[1];
    } else {
      lastHeartbeatTime = null;
      statLast.textContent = '--:--:--';
    }
    updateElapsed();
  } catch(e) { console.error(e); }
}

function updateElapsed() {
  const el = document.getElementById('stat-elapsed');
  if (!lastHeartbeatTime) { el.textContent = '--'; el.className = 'stat-value'; return; }
  const diff = Math.floor((Date.now() - lastHeartbeatTime) / 1000);
  if (diff < 60) {
    el.textContent = diff + ' 秒';
    el.className = diff > 60 ? 'stat-value offline' : 'stat-value online';
  } else {
    const m = Math.floor(diff / 60);
    const s = diff % 60;
    el.textContent = m + '分' + s + '秒';
    el.className = diff > 60 ? 'stat-value offline' : 'stat-value online';
  }
}

async function loadLogs() {
  try {
    const r = await fetch(API + '/api/heartbeats?limit=50');
    const d = await r.json();
    const list = document.getElementById('log-list');
    if (!d.list || d.list.length === 0) {
      list.innerHTML = '<div class="log-empty">暂无记录</div>';
      return;
    }
    list.innerHTML = d.list.map(h =>
      '<div class="log-item">' +
        '<div style="display:flex;align-items:center">' +
          '<div class="log-dot"></div>' +
          '<span class="log-time">' + formatTime(h.received_at) + '</span>' +
        '</div>' +
        '<span class="log-ip">' + h.source_ip + '</span>' +
      '</div>'
    ).join('');
  } catch(e) { console.error(e); }
}

function formatTime(s) {
  const d = new Date(s);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

loadStatus(); loadLogs();
setInterval(loadStatus, 10000);
setInterval(loadLogs, 30000);
setInterval(updateElapsed, 1000); // 实时更新"距上次"
</script>
</body>
</html>
