<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心跳检测 - 家里有没有电</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

  .status-card {
    text-align: center; padding: 48px 24px; border-radius: 16px;
    margin-bottom: 32px; transition: all 0.3s;
  }
  .status-card.online { background: linear-gradient(135deg, #065f46, #047857); box-shadow: 0 0 40px rgba(16,185,129,0.2); }
  .status-card.offline { background: linear-gradient(135deg, #7f1d1d, #991b1b); box-shadow: 0 0 40px rgba(239,68,68,0.2); }
  .status-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin-right: 10px; vertical-align: middle; }
  .status-dot.online { background: #34d399; box-shadow: 0 0 12px #34d399; animation: pulse 2s infinite; }
  .status-dot.offline { background: #f87171; box-shadow: 0 0 12px #f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 28px; font-weight: 700; }
  .status-detail { margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.7); }

  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #94a3b8; }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th { text-align: left; padding: 10px 12px; font-size: 12px; color: #64748b; border-bottom: 1px solid #1e293b; text-transform: uppercase; letter-spacing: 0.5px; }
  .log-table td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #1e293b; }
  .log-table tr:hover td { background: #1e293b; }
  .time-cell { font-family: "SF Mono", "Fira Code", monospace; color: #94a3b8; }
  .ip-cell { color: #64748b; }

  .actions { margin-top: 16px; display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; cursor: pointer; font-size: 13px; }
  .btn:hover { background: #334155; }

  .loading { text-align: center; padding: 40px; color: #64748b; }
</style>
</head>
<body>
<div class="container">
  <div id="status-card" class="status-card offline">
    <div><span id="status-dot" class="status-dot offline"></span><span id="status-text" class="status-text">检测中...</span></div>
    <div id="status-detail" class="status-detail">正在获取心跳状态</div>
  </div>

  <div class="section-title">心跳记录</div>
  <table class="log-table">
    <thead><tr><th>时间</th><th>来源 IP</th></tr></thead>
    <tbody id="log-body"><tr><td colspan="2" class="loading">加载中...</td></tr></tbody>
  </table>
  <div class="actions">
    <button class="btn" onclick="loadLogs()">刷新日志</button>
  </div>
</div>

<script>
const API = '';
let statusInterval;
let logsInterval;

async function loadStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    const card = document.getElementById('status-card');
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const detail = document.getElementById('status-detail');

    if (d.online) {
      card.className = 'status-card online'; dot.className = 'status-dot online';
      text.textContent = '有电';
      detail.textContent = '最近心跳: ' + formatTime(d.last_heartbeat.received_at);
    } else {
      card.className = 'status-card offline'; dot.className = 'status-dot offline';
      if (d.last_heartbeat) {
        const diff = Math.floor((Date.now() - new Date(d.last_heartbeat.received_at).getTime()) / 1000);
        text.textContent = '可能停电';
        detail.textContent = '最近心跳: ' + formatTime(d.last_heartbeat.received_at) + '（' + diff + '秒前）';
      } else {
        text.textContent = '无记录';
        detail.textContent = '尚未收到心跳';
      }
    }
  } catch(e) { console.error(e); }
}

async function loadLogs() {
  try {
    const r = await fetch(API + '/api/heartbeats?limit=50');
    const d = await r.json();
    const body = document.getElementById('log-body');
    if (!d.list || d.list.length === 0) {
      body.innerHTML = '<tr><td colspan="2" class="loading">暂无记录</td></tr>';
      return;
    }
    body.innerHTML = d.list.map(h => '<tr><td class="time-cell">' + formatTime(h.received_at) + '</td><td class="ip-cell">' + h.source_ip + '</td></tr>').join('');
  } catch(e) { console.error(e); }
}

function formatTime(s) {
  const d = new Date(s);
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

loadStatus(); loadLogs();
statusInterval = setInterval(loadStatus, 10000);  // refresh status every 10s
logsInterval = setInterval(loadLogs, 30000);       // refresh logs every 30s
</script>
</body>
</html>
